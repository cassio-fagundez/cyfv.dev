<div style="font-family: 'Outfit', system-ui, sans-serif; font-size: 14px; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px;">
  
  <!-- Header -->
  <div style="text-align: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid #667eea;">
    <div>
      <h1 style="margin: 0; font-size: 22px; font-weight: 700; color: #667eea;">{{title}}</h1>
      <div style="font-size: 14px; color: #764ba2; font-weight: 500;">Website — Cassio Fagúndez</div>
    </div>
  </div>

  <!-- Contenido principal -->
  <div style="background: linear-gradient(135deg, #f8faff 0%, #f0f7ff 100%); padding: 30px; border-radius: 16px; margin-bottom: 20px; border: 1px solid #e0e7ff; box-shadow: 0 8px 24px rgba(102, 126, 234, 0.1);">
    
    <!-- Nombre -->
    <div style="margin-bottom: 24px;">
      <div style="font-size: 12px; color: #667eea; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600;">{{label_name}}</div>
      <div style="font-size: 16px; font-weight: 500; color: #1a202c; background: white; padding: 16px; border-radius: 8px; border: 2px solid #667eea; box-shadow: 0 2px 8px rgba(102, 126, 234, 0.1);">{{name}}</div>
    </div>

    <!-- Correo electrónico -->
    <div style="margin-bottom: 24px;">
      <div style="font-size: 12px; color: #667eea; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600;">{{label_email}}</div>
      <div style="font-size: 16px; font-weight: 500; color: #1a202c; background: white; padding: 16px; border-radius: 8px; border: 2px solid #667eea; box-shadow: 0 2px 8px rgba(102, 126, 234, 0.1);">{{email}}</div>
    </div>

    <!-- Asunto (opcional) -->
    {{#sbj}}
    <div style="margin-bottom: 24px;">
      <div style="font-size: 12px; color: #667eea; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600;">{{label_subject}}</div>
      <div style="font-size: 16px; font-weight: 500; color: #1a202c; background: white; padding: 16px; border-radius: 8px; border: 2px solid #667eea; box-shadow: 0 2px 8px rgba(102, 126, 234, 0.1);">{{sbj}}</div>
    </div>
    {{/sbj}}

    <!-- Mensaje -->
    <div style="margin-bottom: 24px;">
      <div style="font-size: 12px; color: #667eea; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600;">{{l_mess}}</div>
      <div style="background: linear-gradient(135deg, #ffffff 0%, #f8faff 100%); padding: 20px; border-radius: 12px; border-left: 4px solid #667eea; font-size: 15px; line-height: 1.7; white-space: pre-line; min-height: 120px; border: 2px solid #e0e7ff; box-shadow: 0 4px 12px rgba(102, 126, 234, 0.1);">{{message}}</div>
    </div>
  </div>

  <!-- Footer -->
  <div style="text-align: center; padding-top: 24px; border-top: 2px solid #667eea; color: #64748b; font-size: 12px;">
    <div style="margin-bottom: 12px; font-weight: 500;">
      <strong style="color: #667eea;">{{label_sent_from}}</strong> 
      <a href="https://cyfv.dev" style="color: #667eea; text-decoration: none; font-weight: 600;">CYFV.DEV</a>
    </div>
    <div style="font-size: 11px; color: #764ba2; font-weight: 500;">
      {{time}}
    </div>
  </div>
</div>
